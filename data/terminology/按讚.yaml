id: an-zan
category: tech
subcategory: 社群文化
fork_type: C
display:
  taiwan: 按讚
  china: 點贊
  hongkong: 讚好 / 點讚
  southeast_asia: 讚 / 點讚
english: like (social media)
etymology:
  origin: >
    Facebook的「Like」按鈕於2009年推出，在台灣和中國大陸幾乎同時開始翻譯。 台灣以「讚」作為Like的意譯（讚美/稱讚），按下「讚」按鈕的動作稱「按讚」， 動詞＋賓語的中文語法結構。中國大陸以「贊」（簡化字，同音同義）
    加上「點擊」的概念，形成「點贊」，強調「點按」這個操作動作。
  taiwan_path: >
    Facebook於2009年推出Like功能，台灣用戶介面翻譯為「讚」， 「按讚」作為動詞迅速在台灣網路語境固化。台灣各大社群平台 （Facebook、Instagram的繁體中文介面）均標準使用「讚」。
    「讚」在台灣也已延伸為日常口語形容詞（「這個很讚！」）， 完全脫離了「Like按鈕」的原始語境。
  china_path: |
    中國大陸的簡體中文Facebook介面（早期短暫開放期間）使用「讚」， 後微博、微信等平台統一使用「贊」（簡化字），點擊動作稱「點贊」。 「點贊」在中國互聯網語境中也延伸為「給予肯定/支持」的泛稱。
  fork_point: ~2009-2010
  fork_cause: |
    兩岸繁簡字差異（讚 vs 贊）加上UI翻譯團隊各自決定， 形成「按讚」vs「點贊」的分歧。語法結構也略有不同： 台灣「按」（press/click）＋「讚」，中國「點」（tap/click）＋「贊」。
usage:
  taiwan_formal: false
  taiwan_casual: true
  exceptions: |
    正式文章中通常描述為「獲得正面回應」「獲得好評」， 「按讚」主要用於新媒體、廣告、輕鬆文體。
status: stable

detection:
  severity: A
notes: |
  「按讚」vs「點贊」是最直觀辨識台灣/中國網路文章的用語之一。 台灣社群媒體行銷圈廣泛使用「按讚」，中國相關文章必用「點贊」。 Facebook的繁體中文介面官方用語是「讚」，按讚數稱「讚」的數量。
sources:
  - Facebook繁體中文使用者介面（官方）
  - 教育部重編國語辭典 — 讚條目
  - 台灣網路用語研究 — 中研院語言研究所
