id: "huashu"
category: tech
subcategory: 硬體與裝置
fork_type: B

display:
  taiwan: "滑鼠"
  china: 鼠標
  hongkong: "滑鼠"
  southeast_asia: "滑鼠 / 鼠標"

english: "computer mouse"

etymology:
  origin: >
    電腦滑鼠（mouse）的中文譯詞兩岸都試圖翻譯「mouse（老鼠）」的意象，
    但走了不同的路。台灣「滑鼠」強調操作方式（滑動＋鼠形），
    「滑」字描述在桌面上滑動的動作，兼顧形象（鼠）與功能（滑）。
    中國「鼠標」則是「鼠（形）標（游標/指標）」的組合，
    強調它是控制螢幕游標的鼠形裝置。
  taiwan_path: >
    1980年代後期個人電腦普及，台灣教科書制定「滑鼠」為標準譯詞。
    這個詞形象直觀（在桌上滑動的小老鼠），自然好記，
    迅速成為台灣最穩固的電腦周邊用語之一。
    「滑鼠墊」「無線滑鼠」「光學滑鼠」等衍生詞均固定使用「滑鼠」。
  china_path: >
    中國大陸早期也曾使用「滑鼠」，但後來「鼠標」逐漸成為大陸標準，
    強調其作為游標控制工具的功能性。「鼠標」在中國大陸各類電腦教材、
    產品說明書中是絕對主流用語。
  fork_point: "~1985-1990"
  fork_cause: >
    兩岸電腦術語制定機構在1980年代末到1990年代初先後確立各自標準，
    台灣選擇動作描述導向（滑），中國選擇功能描述導向（標/游標）。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: >
    無例外情境，台灣一律使用「滑鼠」，
    在任何文體（技術文件、產品說明、日常對話）中均如此。

status: "stable"

detection:
  severity: A
  false_positives:
    - pattern: "老鼠"
      note: "單純含「鼠」字"
    - pattern: "標記"
      note: "單純含「標」字（無「鼠標」連用）"

notes: >
  「滑鼠」是台灣使用一致性極高的電腦術語，幾乎不存在例外。
  香港也使用「滑鼠」，與台灣一致，反映了繁體中文圈的共同趨勢。
  台灣電腦零售通路（燦坤、全國電子等）所有產品標示均使用「滑鼠」。

sources:
  - "教育部資訊與通訊科技詞彙"
  - "台灣電腦公會標準用語手冊"
  - "燦坤3C官方商品分類名稱"

