id: "yansuan-fa"
category: tech
subcategory: 軟體與程式開發
fork_type: B

display:
  taiwan: "演算法"
  china: "算法"
  hongkong: "演算法 / 算法"
  southeast_asia: "算法 / 演算法"

english: "algorithm"

etymology:
  origin: >
    Algorithm的中文譯詞兩岸均取「算」（計算）的核心概念，
    但台灣加入「演」（演繹推算）強調過程性，形成「演算法」（演繹計算的方法），
    而中國直接以「算法」（計算的方法）二字簡潔表達。
    兩者皆是意譯，差別在於是否強調「演算過程」的動態概念。
  taiwan_path: >
    台灣資訊科學教育從1980年代起制定術語標準，「演算法」列入
    大學電腦科學課程的標準教材用語。台灣各大學（台大、交大、成大等）
    的演算法課程、教科書、技術文件均使用「演算法」。
    台灣AI/機器學習相關媒體和報導延續此標準。
  china_path: >
    中國電腦科學教育使用「算法」，更加簡潔。在深度學習、
    AI研究熱潮（2010年代起）中，「算法」在中國互聯網語境中
    使用頻率極高（「推薦算法」「算法黑箱」「算法歧視」等）。
  fork_point: "~1980s"
  fork_cause: >
    台灣傾向於完整保留過程性（演算的「演」），中國傾向於簡潔（算法），
    反映兩岸術語制定的不同風格取向。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: >
    在台灣讀AI研究論文或閱讀中國大陸學者的中文著作時，
    「算法」可能出現，但Taiwan.md文章一律使用「演算法」。

status: "stable"

detection:
  severity: B
  false_positives:
    - pattern: "演算法"
      note: "台灣正確用語「演算法」含「算法」字串"
    - pattern: "貪婪演算法"
      note: "演算法子類別"
    - pattern: "貪心算法"
      note: "貪心演算法另一寫法（仍為台灣語境）"

notes: >
  「演算法 vs 算法」在AI和電腦科學報導中是最直接的台灣/中國來源辨識指標。
  台灣科技媒體（科技報橘TechOrange、數位時代等）所有相關報導均使用「演算法」。
  「推薦演算法」「機器學習演算法」是台灣AI討論中的標準用語。

sources:
  - "國立台灣大學電機資訊學院演算法課程教材"
  - "資訊工業策進會（資策會）術語標準"
  - "教育部資訊與通訊科技詞彙"

