id: "wassi"
category: daily
subcategory: 日常生活
fork_type: A

display:
  taiwan: "瓦斯"
  china: 煤氣
  hongkong: "煤氣 / 天然氣"
  southeast_asia: "天然氣 / 瓦斯（部分地區）"

english: "gas (fuel) / natural gas / LPG"

etymology:
  origin: >
    「瓦斯」是日語「ガス」（gasu）的漢字寫法，而日語「ガス」
    則來自荷蘭語「gas」（透過蘭學傳入日本）。台灣在日治時期接受這個詞，
    並在光復後持續使用，成為台灣特有的漢字化日語借詞。
    中國大陸則使用「煤氣」（早期煤炭制氣）或「天然氣」（天然採掘氣體），
    均為本地自創漢語詞彙，不走日語路徑。
  taiwan_path: >
    日治時期台灣城市引入煤氣管道，官民均稱「ガス」（gasu）。
    戰後以漢字「瓦斯」固定下來，並擴展涵蓋天然氣、桶裝瓦斯（LPG）等
    所有可燃氣體燃料的統稱。「瓦斯行」「瓦斯爐」「瓦斯桶」均是
    台灣日常基本詞彙，從城市到鄉村普遍使用。
  china_path: >
    中國早期城市使用煤炭製成的「煤氣」，1980年代後天然氣普及，
    開始使用「天然氣」。「瓦斯」在中國大陸幾乎不使用，偶見於
    早期翻譯或特定技術文件，日常完全以「煤氣」或「天然氣」取代。
  fork_point: "~1895（日治借詞）"
  fork_cause: >
    日本殖民統治帶來的日語借詞系統，在台灣形成了獨特的詞彙底層。
    「瓦斯」是最典型的例子之一，保留了日語→荷蘭語→英語的完整借詞鏈。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: >
    技術/學術文件中有時使用「液化石油氣（LPG）」「天然氣（NG）」等
    專業術語，但日常生活和媒體報導以「瓦斯」為標準。

status: "stable"

detection:
  severity: A

notes: >
  「瓦斯」是台灣日語借詞保存最完整的例子之一，展示了日荷英多層借詞路徑。
  在台灣看到「煤氣」幾乎確定是來自中國來源的文本。
  注意：「瓦斯」在台灣同時涵蓋天然氣和桶裝液化石油氣（LPG），
  而中國「天然氣」和「液化氣」則有明確區分。

sources:
  - "教育部重編國語辭典修訂本 — 瓦斯條目"
  - "台灣中油公司天然氣事業部"
