id: "wanglu"
category: tech
subcategory: 網路與通訊
fork_type: B

display:
  taiwan: "網路"
  china: 網絡
  hongkong: "網絡"
  southeast_asia: "互聯網 / 網絡"

english: "internet / network"

etymology:
  origin: >
    「網路」是台灣教育部1990年代在資訊教育推廣時採用的標準譯詞，
    來自「網絡」縮減音節並符合台灣國語習慣（路比絡更常用於連結語境）。
    「互聯網」（Interconnected Network）是中國1994年接入國際網際網路後
    由信息工業部主導的官方譯名，強調互聯互通的技術特徵。
  taiwan_path: >
    1990年代教育部資訊教育融入課程時，統一譯為「網路」。
    國立編譯館教科書、電腦教室、BBS文化全以「網路」為標準。
    台灣網路社群（PTT等）亦延續此用法。
  china_path: >
    1994年中國正式接入國際網路，官方選定「互聯網」為標準譯詞。
    2010年代以後，「網絡」（泛指各種網狀結構）與「互聯網」並行，
    後者特指公共網際網路，前者涵蓋企業內網、電信網路等更廣義用法。
  fork_point: "~1994"
  fork_cause: >
    兩岸幾乎同時期建立網路基礎設施，但分別由各自的語言機構制定譯詞，
    台灣走「路」（道路、連結），中國走「聯」（互聯互通）的詞義路徑。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: >
    技術文件中「網路拓撲」「網路架構」是標準用法，但「神經網絡」
    在深度學習語境中因為與中國學術社群交流頻繁，「神經網路」與
    「神經網絡」在台灣學術界並行，建議統一用「神經網路」。

status: "stable"

detection:
  severity: B
  false_positives:
    - pattern: "網絡層"
      note: "OSI 七層模型「網絡層」是電腦科學標準術語"
    - pattern: "類神經網絡"
      note: "專業術語含「網絡」字串"

notes: >
  「網路」是台灣最穩定的在地用語之一，從小學電腦課到科技媒體報導
  高度一致。年輕世代雖接觸大量中國內容，「網路」的使用仍相當穩定。
  注意：「網絡」在台灣語境中較少單獨出現，通常在特定技術語境（如
  「廣播網絡」）或引用中國報導時出現。

sources:
  - "教育部重編國語辭典修訂本 — 網路條目"
  - "國家發展委員會資訊政策白皮書（1996）"
  - "https://dict.revised.moe.edu.tw/"

