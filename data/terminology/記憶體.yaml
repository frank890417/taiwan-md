id: "jiyi-ti"
category: tech
subcategory: 軟體與程式開發
fork_type: B

display:
  taiwan: "記憶體"
  china: 內存
  hongkong: "記憶體 / 內存"
  southeast_asia: "記憶體 / 內存"

english: "RAM / memory"

etymology:
  origin: >
    電腦記憶儲存裝置的中文譯詞在台灣和中國走了不同路徑。
    台灣採「記憶體」（能儲存記憶的元件），強調功能特性，
    符合台灣電腦術語「以功能命名」的慣例（軟體/硬體/記憶體）。
    中國採「內存」（內部儲存空間的縮略），強調位置屬性（相對於外部儲存），
    是1980年代PC時代電腦進入中國後制定的標準術語。
  taiwan_path: >
    台灣資訊教育推廣委員會（1980年代起）制定電腦術語標準，
    「記憶體」作為memory的標準譯詞納入教科書體系。
    台灣各大電腦賣場、零售商（光華商場等）、媒體均使用「記憶體」，
    尤其是RAM（隨機存取記憶體）的通稱。
    「記憶體不足」「擴充記憶體」等用法是台灣電腦語境的基本句型。
  china_path: >
    中國1980年代引進PC時，由信息工業部制定術語標準，
    「內存」（内部存储器）成為RAM的官方簡稱，
    相對於「外存」（外部儲存：磁帶、磁碟等）。
    「內存條」指RAM模組，「內存不足」是常見錯誤提示。
  fork_point: "~1980s"
  fork_cause: >
    1980年代電腦進入兩岸，兩岸語言機構各自制定電腦術語標準，
    台灣選擇功能導向譯詞（記憶體），中國選擇位置導向術語（內存）。

usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: >
    儲存裝置的語義層次：台灣「記憶體」通常特指RAM（揮發性），
    「儲存空間」或「硬碟/SSD」指非揮發性儲存。
    「記憶體」偶爾也廣義指所有儲存元件，須依語境判斷。

status: "stable"

detection:
  severity: A

notes: >
  「記憶體 vs 內存」是辨識台灣/中國技術文章最可靠的指標之一。
  台灣任何正式的電腦技術文章、產品規格、評測報告均使用「記憶體」。
  注意：「記憶」在台灣也是心理學術語，「記憶體」的「體」字
  明確指硬體元件，不會與心理學用語混淆。

sources:
  - "教育部資訊與通訊科技詞彙（ICT Glossary）"
  - "國立台灣大學計算機科學系電腦術語標準"
  - "台灣電腦公會術語標準手冊"

