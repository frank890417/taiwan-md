id: usb_drive
category: tech
subcategory: 硬體與裝置
fork_type: B
display:
  taiwan: 隨身碟 / USB隨身碟
  china: U盤
  hongkong: USB手指
english: USB flash drive / thumb drive
etymology:
  origin: 各地命名方式完全不同。台灣強調隨身攜帶特性；中國以 USB 首字母「U」命名；香港稱「手指」形容其形狀
  taiwan_path: 2000年代初隨 USB 隨身碟普及，台灣命名強調「隨身攜帶的磁碟」
  china_path: 中國以「U盤」（U disk）命名，簡潔直接，已成大陸標準
  fork_point: ~2000s
  fork_cause: 各地自行命名，缺乏兩岸統一機制
usage:
  taiwan_formal: true
  taiwan_casual: true
  exceptions: 台灣也有人說『USB』但不說『U盤』
status: stable

detection:
  severity: A
notes: 三地說法各異：台灣「隨身碟」、中國「U盤」、香港「USB手指」，是現代科技詞彙兩岸三地命名分歧的最佳範本。
sources:
  - 藍光濾波研究所 C2T 詞庫
  - ThunderKO C2T 詞庫
