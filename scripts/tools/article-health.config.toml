# article-health.config.toml — SSOT 文章健檢工具的 declarative config.
#
# 設計提案：reports/article-health-ssot-design-2026-05-04.md
# Canonical 寫作品質規則：docs/editorial/EDITORIAL.md
#
# Phases 1-7 shipped 2026-05-04. 13 plugins registered:
#   cjk-punct / cross-reference / footnote-density / footnote-format /
#   footnote-url / format-structure / frontmatter-format /
#   frontmatter-title / image-health / link-target / prose-health /
#   terminology / wikilink-target
#
# link-target added 2026-05-04 jovial-feistel session — Phase 1 (casing,
# HARD, auto-fix) caught 649 `]( /lang/UpperCase/...)` broken-routing
# violations across 209 files; Phase 2 (existence, WARN) cross-checks
# every link target against `knowledge/{lang}/{Category}/*.md` filesystem.
# Source-layer counterpart of post-build `verify-internal-links.sh`.

[meta]
version = 1
canonical_doc = "docs/editorial/EDITORIAL.md"
phase = "7-pre-commit-wired"

# ── Per-check severity / options ─────────────────────────────────────────────
# Plugin defaults are set in each module (DEFAULT_SEVERITY). Override here.
# (No overrides currently — plugin defaults are appropriate.)

# ── Stage profiles ───────────────────────────────────────────────────────────

[profiles.pre-commit]
# Pre-commit hook gate. HARD violations block; WARN reported but allowed.
# 2026-05-11 admiring-cohen: 對齊 ci-deploy profile — 用 `*` 跑全部 13
# plugins，避免「pre-commit 過、ci-deploy fail」這種 asymmetric ship
# (root cause of 2026-05-11 CI emergency PR #1025 — 雜誌.md missing
# featured + MTV包廂.md missing subcategory 兩個檔不在原 pre-commit
# 7-check list 但在 ci-deploy * 範圍，contributor PR squash merge 不跑
# pre-commit，maintainer 本地 heal commit 跑 pre-commit 也沒抓到)。
#
# 對稱原則：本地 commit 跟 main 自動 CI 該跑同一份 check set，避免
# false-positive ship。WARN 仍 advisory（不擋），HARD 才擋 commit。
#
# 歷史 — pre-commit 原本 7 checks 是 legacy inline-check 對應，Phase
# 1-10 一次升一個 plugin。現在所有 13 plugins 都穩定，pre-commit 對齊
# ci-deploy 沒有額外風險（fail_on=hard 不變，只是擴大 scope）。
checks = "*"
fail_on = "hard"

[profiles."rewrite-stage-3"]
# REWRITE-PIPELINE Stage 3 (Verify): quality-scan ≤ 3 budget.
checks = ["prose-health"]
fail_on = "score-budget"

[profiles."rewrite-stage-3-5"]
# Stage 3.5 FactCheck — citation health.
checks = ["footnote-format", "footnote-density"]
fail_on = "hard"

[profiles."rewrite-stage-4"]
# Stage 4 Format.
# chronicle-lead added 2026-05-09 brave-kirch (REWRITE v3.0 D Wave 1) —
# new articles 跑 stage-4 profile 會 hard-fail；legacy soft-launch via WARN
# default + 後續 follow-up heal commits 修 17 個既存 violation 後升 HARD default.
# word-count added 2026-05-10 sad-shockley — depth threshold 4500 CJK chars，
# 觸發：台灣無人機產業 EVOLVE 後仍 3273 字 = 虎頭蛇尾，觀察者 mandate 升 plugin gate.
# Soft-launch: WARN default；rewrite-stage-4 升 HARD（new article must pass）。
# Legacy heal 路徑：以下 sub-list 累積 audit 後分批 heal commit。
checks = ["frontmatter-format", "format-structure", "wikilink-target", "link-target", "cjk-punct", "chronicle-lead", "word-count"]
fail_on = "hard"

[profiles."rewrite-stage-4".severity_overrides]
frontmatter-format = "hard"
chronicle-lead = "hard"
word-count = "hard"

[profiles."rewrite-stage-4".check_options.word-count]
min_chars = 4500

[profiles."rewrite-stage-4-5"]
# Stage 4.5 Media.
checks = ["image-health"]
fail_on = "hard"

[profiles.release-pr]
# 全跑、嚴格 (both HARD and WARN trigger fail). 用於人工 release review。
checks = "*"
fail_on = "warn"

[profiles.ci-deploy]
# CI 自動部署 gate — 全跑、只擋 HARD violations。WARN 是 advisory（dashboard
# + human review 看），不應擋 deploy。2026-05-04 加入：release-pr 對既存
# 4,378 個 advisory WARN 無法在 CI 觸發點修完，需要分離 strict release
# review (release-pr) 跟 deploy gate (ci-deploy) 兩個用途。
checks = "*"
fail_on = "hard"

[profiles.dashboard]
# 全跑、不擋、JSON output for site dashboards.
checks = "*"
fail_on = "never"
